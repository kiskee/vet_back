version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: app_sara_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_sara
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
